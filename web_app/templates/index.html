<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center;

            height: 100vh; 
            margin: 0; 
        }

            background: white;

<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p>Success! The template was found in the <b>/templates</b> folder.</p>
