<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h1 { 
            color: #4a90e2; 
            margin-bottom: 0.5rem;
        }
        p { 
            font-size: 1.1rem; 
            color: #666;
        }
        .status {
            color: #27ae60;
            font-weight: bold;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to {{ title }}</h1>
        <p>If you are seeing this, your Flask app is officially working!</p>
        <div class="status">
            <span>✔</span> Template successfully loaded
        </div>
    </div>
</body>
</html>
